<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📋 To-Do List</title>
    
</head>
<body>

    <div class="todo-card">
        <h1>📋 To-Do List</h1>
        <div class="subtitle">Stay organized, stay productive.</div>

        <!-- Input Row -->
        <div class="input-row">
            <input type="text" id="taskInput" placeholder="Write a new task…" />
            <button id="addBtn">➕ Add</button>
        </div>

        <!-- Stats -->
        <div class="stats">
            <span id="totalCount">0 total</span>
            <span id="doneCount">0 done</span>
        </div>

        <!-- Task List -->
        <ul class="task-list" id="taskList">
            <!-- Tasks rendered by JavaScript -->
        </ul>
    </div>
</body>
</html>
